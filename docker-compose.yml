services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: dragon_services
      POSTGRES_USER: dragonbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragonbot -d dragon_services"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      BOT_ENABLED: "true"
      DATABASE_URL: postgresql://dragonbot:${DB_PASSWORD}@db:5432/dragon_services
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      SESSION_SECRET: ${SESSION_SECRET}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      VOUCH_CHANNEL_ID: ${VOUCH_CHANNEL_ID:-1414374874809368656}
      WITHDRAWAL_NOTIFICATION_CHANNEL_ID: ${WITHDRAWAL_NOTIFICATION_CHANNEL_ID:-1449760619292131398}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/docker-entrypoint.sh"]

volumes:
  db_data:
